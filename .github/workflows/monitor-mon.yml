name: SNAPSHOT MON monitor

# Runs the __MON monitor here (like the __GET captures): pull the venv_mon
# image built by __MON, clone the latest __MON source, run monitor_graph.py
# (posts via the JangoOk bot), push the updated state back to __MON, and record
# a CI log on this repo.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-mon]

permissions:
  contents: write      # push CI log to this repo (SNAPSHOT) via GITHUB_TOKEN
  packages: read       # pull the private venv_mon image

concurrency:
  group: snap-mon
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: ghcr.io/${{ github.repository_owner }}/venv_mon:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PAT3 }}

    env:
      TZ: Asia/Seoul
      # PAT3 (repo scope) to clone+push __MON; GITHUB_TOKEN only covers SNAPSHOT.
      MON_REPO_URL: https://x-access-token:${{ secrets.PAT3 }}@github.com/junghh21/__MON.git
      SNAP_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      TELEGRAM_BOT_TOKEN: ${{ secrets.MON_TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.MON_TELEGRAM_CHAT_ID }}

    steps:
      - name: Clone __MON source
        run: |
          git config --global --add safe.directory '*'
          git clone "$MON_REPO_URL" src

      - name: Run monitor (latest source)
        working-directory: src
        run: |
          set -o pipefail
          python3 src/monitor_graph.py 2>&1 | tee ../run.log || echo "RUN_FAILED=1" >> "$GITHUB_ENV"

      - name: Commit monitor state back to __MON
        if: always()
        working-directory: src
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(TZ=Asia/Seoul date)" > current_time.txt
          git add -A
          git commit -m "monitor run: $(TZ=Asia/Seoul date '+%F %T KST') [skip ci]" || { echo "no state change"; exit 0; }
          git pull --rebase || true
          git push

      - name: Record CI log on SNAPSHOT main
        if: always()
        run: |
          git clone "$SNAP_URL" out
          mkdir -p out/logs
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          status="ok"; [ -n "${RUN_FAILED:-}" ] && status="FAILED"
          {
            echo ""
            echo "## MON @ ${ts} — ${status} (run #${GITHUB_RUN_NUMBER})"
            echo '```'
            tail -n 25 run.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> out/logs/ci-mon.md
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci-mon.md
          git commit -m "ci(mon): ${ts} ${status} [skip ci]" || exit 0
          git pull --rebase --autostash origin main || true
          git push
