name: SNAPSHOT 3h capture

# Every 3 hours, aligned to 07:00 KST (07/10/13/16/19/22/01/04 KST).
# 0 1,4,7,10,13,16,19,22 * * * holds in both UTC and KST (9h offset is a
# multiple of 3). Runs main1.py in the GHCR image, publishes the dashboard to
# gh-pages, logs to main.

on:
  schedule:
    - cron: '0 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-3h]

permissions:
  contents: write
  packages: read

concurrency:
  group: snap-3h
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    container:
      image: ghcr.io/${{ github.repository_owner }}/venv_get:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PAT3 }}

    env:
      TZ: Asia/Seoul
      # container: jobs set HOME=/github/home, but the image baked chromium under
      # /root/.cache; point Playwright at it so the browser is found.
      PLAYWRIGHT_BROWSERS_PATH: /root/.cache/ms-playwright
      REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Clone __GET source
        run: |
          git config --global --add safe.directory '*'
          git clone --depth 1 https://github.com/junghh21/__GET.git src

      - name: Seed dashboard from gh-pages
        run: |
          git clone --depth 1 -b gh-pages "$REPO_URL" src/site || mkdir -p src/site/img

      - name: Run 3h capture (LangGraph workflow — all targets)
        working-directory: src
        env:
          SITE_DIR: site
          LG_MAX_RETRIES: '2'
        run: |
          set -o pipefail
          python3 -m __LANGGRAPH.runner 2>&1 | tee ../run.log || echo "RUN_FAILED=1" >> "$GITHUB_ENV"

      - name: Publish dashboard to gh-pages
        if: always()
        working-directory: src/site
        run: |
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -d .git ]; then
            git init -q && git checkout -q -b gh-pages
            git remote add origin "$REPO_URL"
          fi
          touch .nojekyll
          git add -A
          git commit -qm "dashboard(3h): ${ts}" || { echo "no dashboard change"; exit 0; }
          git pull --rebase origin gh-pages || true
          git push origin gh-pages

      - name: Record CI log on main
        if: always()
        run: |
          git clone "$REPO_URL" out
          mkdir -p out/logs
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          status="ok"; [ -n "${RUN_FAILED:-}" ] && status="FAILED"
          {
            echo ""
            echo "## 3h @ ${ts} — ${status} (run #${GITHUB_RUN_NUMBER})"
            echo '```'
            tail -n 25 run.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> out/logs/ci-3h.md
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci-3h.md
          git commit -m "ci(3h): ${ts} ${status} [skip ci]" || exit 0
          git pull --rebase --autostash origin main || true
          git push
