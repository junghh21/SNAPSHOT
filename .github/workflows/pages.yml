name: SNAPSHOT dashboard (GitHub Pages)

# __MON-style: build the dashboard inside the GHCR image, then publish it by
# force-pushing site/ to the gh-pages branch (git only — no Node actions, so it
# runs entirely inside the python image). Pages serves from the gh-pages branch.

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated target names (blank = all)'
        required: false
        default: ''
  repository_dispatch:
    types: [deploy-dashboard]

permissions:
  contents: write      # push gh-pages
  packages: read       # pull venv_get image

concurrency:
  group: snap-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    container:
      image: ghcr.io/${{ github.repository_owner }}/venv_get:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PAT3 }}

    env:
      TZ: Asia/Seoul
      LG_TARGETS: ${{ github.event.inputs.targets }}
      LG_NO_TELEGRAM: '1'
      LG_DASHBOARD_DIR: site

    steps:
      - name: Clone __GET source
        run: |
          git config --global --add safe.directory '*'
          git clone --depth 1 https://github.com/junghh21/__GET.git src

      - name: Build dashboard (capture -> site/)
        working-directory: src
        run: |
          python3 -m __LANGGRAPH.runner
          test -f site/index.html

      - name: Publish to gh-pages
        run: |
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          mkdir gh && cd gh
          git init -q
          git checkout -q -b gh-pages
          cp -r ../src/site/* .
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "dashboard ${ts}"
          git push -f \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages
