name: SNAPSHOT 30m capture

# Execution repo: pulls the runtime image built by __GET (ghcr venv_get),
# clones the latest __GET source, runs the 30-minute capture job, then records
# a CI log line back into this repo.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-30m]

permissions:
  contents: write      # push the CI log
  packages: read       # pull the private venv_get image

concurrency:
  group: snap-30m
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT3 }}

      - name: Clone __GET source
        run: |
          rm -rf src
          git clone --depth 1 https://github.com/junghh21/__GET.git src

      - name: Run 30m capture
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_COIN_BOT_TOKEN: ${{ secrets.TELEGRAM_COIN_BOT_TOKEN }}
          TELEGRAM_COIN_CHAT_ID: ${{ secrets.TELEGRAM_COIN_CHAT_ID }}
        run: |
          set -o pipefail
          docker run --rm \
            -e TELEGRAM_BOT_TOKEN -e TELEGRAM_CHAT_ID \
            -e TELEGRAM_COIN_BOT_TOKEN -e TELEGRAM_COIN_CHAT_ID \
            -v "$PWD/src":/app -w /app \
            ghcr.io/junghh21/venv_get:latest \
            python main.py 2>&1 | tee run.log || echo "RUN_FAILED=1" >> "$GITHUB_ENV"

      - name: Record CI log and push
        if: always()
        run: |
          mkdir -p logs
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          status="ok"; [ -n "${RUN_FAILED:-}" ] && status="FAILED"
          {
            echo ""
            echo "## 30m @ ${ts} — ${status} (run #${GITHUB_RUN_NUMBER})"
            echo '```'
            tail -n 25 run.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> logs/ci-30m.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci-30m.md
          git commit -m "ci(30m): ${ts} ${status} [skip ci]" || exit 0
          git pull --rebase --autostash origin main || true
          git push
