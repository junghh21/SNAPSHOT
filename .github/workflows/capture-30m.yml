name: SNAPSHOT 30m capture

# __MON-style: the GHCR image (built by __GET) IS the runtime container.
# Clone the latest __GET source, run the 30m capture (which posts to Telegram
# AND writes the dashboard into site/ via __COMMON/site.py), publish site/ to
# the gh-pages branch, and record a CI log on main.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-30m]

permissions:
  contents: write
  packages: read

concurrency:
  group: snap-30m
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    container:
      image: ghcr.io/${{ github.repository_owner }}/venv_get:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PAT3 }}

    env:
      TZ: Asia/Seoul
      REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_COIN_BOT_TOKEN: ${{ secrets.TELEGRAM_COIN_BOT_TOKEN }}
      TELEGRAM_COIN_CHAT_ID: ${{ secrets.TELEGRAM_COIN_CHAT_ID }}

    steps:
      - name: Clone __GET source
        run: |
          git config --global --add safe.directory '*'
          git clone --depth 1 https://github.com/junghh21/__GET.git src

      - name: Seed dashboard from gh-pages
        run: |
          git clone --depth 1 -b gh-pages "$REPO_URL" src/site || mkdir -p src/site/img

      - name: Run 30m capture (LangGraph workflow)
        working-directory: src
        env:
          SITE_DIR: site
          LG_TARGETS: tradingview-es-futures,yahoo-finance-markets,cboe-vix,vixcentral-term,tradingview-ng-futures
          LG_MAX_RETRIES: '2'
        run: |
          set -o pipefail
          python3 -m __LANGGRAPH.runner 2>&1 | tee ../run.log || echo "RUN_FAILED=1" >> "$GITHUB_ENV"
          # coin alerts (mining pool + coingecko + CMC) — not part of the capture graph
          python3 -c "import main; main.job_coin()" 2>&1 | tee -a ../run.log || true

      - name: Publish dashboard to gh-pages
        if: always()
        working-directory: src/site
        run: |
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -d .git ]; then
            git init -q && git checkout -q -b gh-pages
            git remote add origin "$REPO_URL"
          fi
          touch .nojekyll
          git add -A
          git commit -qm "dashboard(30m): ${ts}" || { echo "no dashboard change"; exit 0; }
          git pull --rebase origin gh-pages || true
          git push origin gh-pages

      - name: Record CI log on main
        if: always()
        run: |
          git clone "$REPO_URL" out
          mkdir -p out/logs
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          status="ok"; [ -n "${RUN_FAILED:-}" ] && status="FAILED"
          {
            echo ""
            echo "## 30m @ ${ts} — ${status} (run #${GITHUB_RUN_NUMBER})"
            echo '```'
            tail -n 25 run.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> out/logs/ci-30m.md
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci-30m.md
          git commit -m "ci(30m): ${ts} ${status} [skip ci]" || exit 0
          git pull --rebase --autostash origin main || true
          git push
