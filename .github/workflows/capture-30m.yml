name: SNAPSHOT 30m capture

# __MON-style: the GHCR image (built by __GET) IS the runtime container.
# Clone the latest __GET source inside it, run the 30m capture, then record a
# CI log back into this repo.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-30m]

permissions:
  contents: write      # push the CI log to this repo
  packages: read       # pull the private venv_get image

concurrency:
  group: snap-30m
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Registry image as the execution environment (python + deps + chromium).
    container:
      image: ghcr.io/${{ github.repository_owner }}/venv_get:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.PAT3 }}

    env:
      TZ: Asia/Seoul
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_COIN_BOT_TOKEN: ${{ secrets.TELEGRAM_COIN_BOT_TOKEN }}
      TELEGRAM_COIN_CHAT_ID: ${{ secrets.TELEGRAM_COIN_CHAT_ID }}

    steps:
      - name: Clone __GET source
        run: |
          git config --global --add safe.directory '*'
          git clone --depth 1 https://github.com/junghh21/__GET.git src

      - name: Run 30m capture (latest source)
        working-directory: src
        run: |
          set -o pipefail
          python3 main.py 2>&1 | tee ../run.log || echo "RUN_FAILED=1" >> "$GITHUB_ENV"

      - name: Record CI log and push
        if: always()
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git out
          mkdir -p out/logs
          ts="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          status="ok"; [ -n "${RUN_FAILED:-}" ] && status="FAILED"
          {
            echo ""
            echo "## 30m @ ${ts} — ${status} (run #${GITHUB_RUN_NUMBER})"
            echo '```'
            tail -n 25 run.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> out/logs/ci-30m.md
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci-30m.md
          git commit -m "ci(30m): ${ts} ${status} [skip ci]" || exit 0
          git pull --rebase --autostash origin main || true
          git push
